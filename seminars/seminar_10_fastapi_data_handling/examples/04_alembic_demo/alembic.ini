# alembic.ini — конфигурация Alembic для Notes API
# Документация: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Путь к директории с миграциями (относительно этого файла)
script_location = alembic

# Формат имён файлов миграций: временная_метка_описание.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# DATABASE_URL можно переопределить здесь или через переменную окружения.
# В env.py мы читаем из os.environ, поэтому это поле оставляем пустым.
sqlalchemy.url =

[post_write_hooks]
# Автоформатирование сгенерированных миграций через Ruff
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = %(here)s/../../../../../.venv/bin/ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
