# ============================================================
# alembic.ini — конфигурация Alembic
# ============================================================
# Документация: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Путь к директории с миграциями (относительно этого файла)
script_location = app/alembic

# Шаблон имён файлов миграций: дата_время_описание.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Строка подключения к БД.
# ВАЖНО: в Docker Compose она переопределяется через переменную окружения
# DATABASE_URL, которую читает env.py. Здесь оставляем пустой.
sqlalchemy.url =

# Кодировка файлов миграций
output_encoding = utf-8

[post_write_hooks]
# Автоформатирование сгенерированных миграций через ruff
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = %(here)s/.venv/bin/ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
